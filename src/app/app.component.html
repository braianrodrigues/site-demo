<!-- Toolbar ÚNICA -->
<mat-toolbar class="app-toolbar">
  <!-- Botão de menu só quando logado -->
  <button
    mat-icon-button
    (click)="snav?.toggle()"
    aria-label="Abrir menu lateral"
    *ngIf="isLogged()"
  >
    <mat-icon>menu</mat-icon>
  </button>

  <!-- Logo + título (sempre visível) -->
  <img class="toolbar-logo" src="assets/logo1.png" alt="Sistema" />
  <span class="toolbar-title">
    Plataforma de Gestão Operacional
  </span>

  <span class="fill"></span>

  <!-- Ações do topo só quando logado -->
  <ng-container *ngIf="isLogged() && auth.user() as u">
    <button
      mat-icon-button
      matTooltip="Notificações"
      aria-label="Notificações"
    >
      <mat-icon [matBadge]="notifications" matBadgeColor="warn">
        notifications
      </mat-icon>
    </button>

    <button
      mat-button
      [matMenuTriggerFor]="userMenu"
      aria-label="Abrir menu do usuário"
    >
      <mat-icon>account_circle</mat-icon>
      &nbsp; {{ u.fullName || u.username }}
    </button>

    <mat-menu #userMenu="matMenu">
      <button mat-menu-item (click)="openProfile()">
        <mat-icon>person</mat-icon>
        <span>Perfil</span>
      </button>
      <button mat-menu-item (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Sair</span>
      </button>
    </mat-menu>
  </ng-container>
</mat-toolbar>

<!-- Conteúdo principal -->
<mat-sidenav-container class="shell">
  <!-- Sidenav só quando logado -->
  <mat-sidenav
    #snav
    mode="over"
    *ngIf="isLogged()"
    role="navigation"
    aria-label="Navegação principal"
  >
    <mat-nav-list>
      <a
        mat-list-item
        routerLink="/"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="snav?.close()"
      >
        <mat-icon>dashboard</mat-icon>&nbsp;Dashboard
      </a>

      <!-- Itens visíveis para todos os logados -->
      <a
        mat-list-item
        routerLink="/operacoes"
        routerLinkActive="active"
        (click)="snav?.close()"
      >
        <mat-icon>assignment</mat-icon>&nbsp;Operações
      </a>

      <a
        mat-list-item
        routerLink="/produtividade"
        routerLinkActive="active"
        (click)="snav?.close()"
      >
        <mat-icon>trending_up</mat-icon>&nbsp;Produtividade
      </a>

      <a
        mat-list-item
        routerLink="/alvos"
        routerLinkActive="active"
        (click)="snav?.close()"
      >
        <mat-icon>track_changes</mat-icon>&nbsp;Alvos
      </a>

      <a
        mat-list-item
        routerLink="/perfil"
        routerLinkActive="active"
        (click)="snav?.close()"
      >
        <mat-icon>person</mat-icon>&nbsp;Perfil
      </a>

      <!-- Se a rota /evidata ainda existir no projeto, mantém -->
      <a
        mat-list-item
        routerLink="/evidata"
        routerLinkActive="active"
        (click)="snav?.close()"
      >
        <mat-icon>analytics</mat-icon>&nbsp;Evidata
      </a>

      <!-- Administrativo / gestão -->
      <a
        mat-list-item
        routerLink="/usuarios"
        routerLinkActive="active"
        *ngIf="auth.canManageUsers()"
        (click)="snav?.close()"
      >
        <mat-icon>supervisor_account</mat-icon>&nbsp;Usuários
      </a>

      <a
        mat-list-item
        routerLink="/relatorios"
        routerLinkActive="active"
        *ngIf="auth.canAccessAdministrativo()"
        (click)="snav?.close()"
      >
        <mat-icon>analytics</mat-icon>&nbsp;Relatórios
      </a>

      <a
        mat-list-item
        routerLink="/logs"
        routerLinkActive="active"
        *ngIf="auth.canAccessAdministrativo()"
        (click)="snav?.close()"
      >
        <mat-icon>list_alt</mat-icon>&nbsp;Logs
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <div class="container">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>

<app-toast></app-toast>
